name: Deploy Static Site to EC2

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to EC2 via SSH
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          WEB_PATH: ${{ secrets.EC2_WEB_PATH || '/var/www/html' }}
        run: |
          echo "🚀 Starting deployment to $USER@$HOST:$WEB_PATH"

          # --- A. Provision Server (Install Nginx, Config, Permissions) ---
          # We use a single SSH call with a quoted heredoc (EOF) to avoid escaping hell.
          # The Nginx config is Base64 encoded inline to bypass nested heredoc issues.
          NGINX_CONF_B64=$(cat << 'NGINXEOF' | base64 -w0
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        root $WEB_PATH;
        index index.html index.htm;
        server_name _;
        location / {
            try_files $uri $uri/ =404;
        }
    }
NGINXEOF
          )

          ssh -o StrictHostKeyChecking=no "$USER@$HOST" bash -s << 'ENDSSH'
            set -e
            echo "📦 Updating packages & Installing Nginx..."
            sudo apt-get update && sudo apt-get install -y nginx

            echo "📂 Setting up web root: $WEB_PATH"
            sudo mkdir -p "$WEB_PATH"
            sudo chown -R "$USER:$USER" "$WEB_PATH"

            echo "⚙️ Writing Nginx config from Base64..."
            # Decode the config passed via environment variable
            echo "$NGINX_CONF_B64" | base64 -d | sudo tee /etc/nginx/sites-available/default > /dev/null

            echo "🔄 Reloading Nginx..."
            sudo systemctl enable nginx
            sudo systemctl restart nginx
          ENDSSH

          # --- B. Sync Application Files ---
          echo "📂 Syncing project files via rsync..."
          # --exclude '.github/' keeps workflow files off the server
          rsync -avz --delete --exclude '.github/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            "$USER@$HOST:$WEB_PATH/"

          # --- C. Final Permissions ---
          echo "🔐 Fixing permissions..."
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" << 'ENDFIX'
            sudo find "$WEB_PATH" -type f -exec chmod 644 {} \;
            sudo find "$WEB_PATH" -type d -exec chmod 755 {} \;
            sudo chmod 755 "$WEB_PATH"
            echo "✅ Deployment Complete! Site live at http://$HOST"
          ENDFIX
