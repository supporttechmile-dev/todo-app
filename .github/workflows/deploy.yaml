name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy site files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu          # use ec2-user for Amazon Linux
          key: ${{ secrets.SSH_KEY }}
          source: "index.html,style.css,script.js,bars-icon.svg"
          target: "/tmp/todo-app"
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu          # use ec2-user for Amazon Linux
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/todo-app
            sudo cp -r /tmp/todo-app/* /var/www/todo-app/
            sudo chown -R www-data:www-data /var/www/todo-app
            sudo systemctl restart nginx