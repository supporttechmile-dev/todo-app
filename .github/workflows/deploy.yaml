# Deploy static Todo app to EC2 using GitHub OIDC (no SSH keys).
#
# Required GitHub secrets:
#   AWS_IAM_ROLE      - IAM role ARN trusted by GitHub OIDC
#
# Required GitHub secrets OR repository variables (Settings → Secrets and variables → Actions):
#   EC2_INSTANCE_ID   - EC2 instance ID (e.g. i-0abc123def4567890a)
#   DEPLOY_BUCKET     - S3 bucket name (e.g. my-todo-app-deploy-12345)
#
# Required AWS setup (one-time):
#   1. EC2 Ubuntu instance with SSM Agent (default on AWS Ubuntu AMIs)
#   2. EC2 instance IAM role with:
#        - AmazonSSMManagedInstanceCore
#        - s3:GetObject, s3:ListBucket on DEPLOY_BUCKET
#   3. GitHub OIDC IAM role with:
#        - s3:PutObject, s3:DeleteObject, s3:ListBucket on DEPLOY_BUCKET
#        - ssm:SendCommand, ssm:GetCommandInvocation on the EC2 instance
#   4. EC2 security group: allow inbound HTTP (port 80)
#   5. Open site at http://<EC2_PUBLIC_IP>  (use http, not https)

name: Deploy Todo App to EC2

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "style.css"
      - "script.js"
      - "bars-icon.svg"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_PREFIX: todo-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET || secrets.DEPLOY_BUCKET }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || secrets.EC2_INSTANCE_ID }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.AWS_IAM_ROLE }}" ] && missing="$missing AWS_IAM_ROLE"
          [ -z "$DEPLOY_BUCKET" ] && missing="$missing DEPLOY_BUCKET"
          [ -z "$EC2_INSTANCE_ID" ] && missing="$missing EC2_INSTANCE_ID"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required config:$missing"
            echo ""
            echo "Add them in GitHub: Repo → Settings → Secrets and variables → Actions"
            echo "  (use either Secrets tab OR Variables tab for DEPLOY_BUCKET and EC2_INSTANCE_ID)"
            echo ""
            echo "  DEPLOY_BUCKET     = S3 bucket name you created in AWS (no s3:// prefix)"
            echo "  EC2_INSTANCE_ID   = Instance ID from EC2 console (starts with i-)"
            echo "  AWS_IAM_ROLE      = secret only — your OIDC IAM role ARN"
            exit 1
          fi
          echo "DEPLOY_BUCKET=$DEPLOY_BUCKET"
          echo "EC2_INSTANCE_ID=$EC2_INSTANCE_ID"
          echo "Required config is set."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Upload site files to S3
        run: |
          aws s3 sync . "s3://${DEPLOY_BUCKET}/${{ env.S3_PREFIX }}/" \
            --exclude "*" \
            --include "index.html" \
            --include "style.css" \
            --include "script.js" \
            --include "bars-icon.svg" \
            --delete

      - name: Build EC2 deploy script
        run: |
          cat > deploy-remote.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          BUCKET="$1"
          REGION="$2"
          PREFIX="$3"
          WEB_ROOT="/var/www/todo-app"

          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq nginx awscli

          mkdir -p "${WEB_ROOT}"
          aws s3 sync "s3://${BUCKET}/${PREFIX}/" "${WEB_ROOT}/" \
            --region "${REGION}" \
            --exclude "deploy-remote.sh" \
            --delete

          chown -R www-data:www-data "${WEB_ROOT}"

          tee /etc/nginx/sites-available/todo-app > /dev/null << 'NGINX'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              root /var/www/todo-app;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          NGINX

          ln -sf /etc/nginx/sites-available/todo-app /etc/nginx/sites-enabled/todo-app
          rm -f /etc/nginx/sites-enabled/default
          nginx -t
          systemctl enable nginx
          systemctl restart nginx

          echo "Deployed files:"
          ls -la "${WEB_ROOT}"
          SCRIPT

          chmod +x deploy-remote.sh
          aws s3 cp deploy-remote.sh \
            "s3://${DEPLOY_BUCKET}/${{ env.S3_PREFIX }}/deploy-remote.sh"

      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy todo-app from GitHub Actions (OIDC)" \
            --parameters "commands=[
              \"aws s3 cp s3://${DEPLOY_BUCKET}/${{ env.S3_PREFIX }}/deploy-remote.sh /tmp/deploy-remote.sh --region ${{ env.AWS_REGION }}\",
              \"chmod +x /tmp/deploy-remote.sh\",
              \"bash /tmp/deploy-remote.sh ${DEPLOY_BUCKET} ${{ env.AWS_REGION }} ${{ env.S3_PREFIX }}\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"

          for attempt in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt ${attempt}: ${STATUS}"

            if [ "$STATUS" = "Success" ]; then
              echo "----- Deploy output -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "----- Deploy error output -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "ERROR: Timed out waiting for SSM deploy command."
          exit 1
