name: Deploy Static Site to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          WEB_PATH: ${{ secrets.EC2_WEB_PATH }}
        run: |
          WEB_PATH="${WEB_PATH:-/var/www/html}"

          echo "Deploying to $USER@$HOST"

          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
            set -e

            sudo apt-get update
            sudo apt-get install -y nginx

            sudo mkdir -p '$WEB_PATH'
            sudo chown -R '$USER:$USER' '$WEB_PATH'

            cat <<EOF | sudo tee /etc/nginx/sites-available/default > /dev/null
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root $WEB_PATH;
    index index.html index.htm;

    server_name _;

    location / {
        try_files \\\$uri \\\$uri/ =404;
    }
}
EOF

            sudo nginx -t
            sudo systemctl enable nginx
            sudo systemctl restart nginx
          "

          rsync -avz --delete \
            --exclude '.github/' \
            -e 'ssh -o StrictHostKeyChecking=no' \
            ./ \
            \"$USER@$HOST:$WEB_PATH/\"

          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
            sudo find '$WEB_PATH' -type f -exec chmod 644 {} \;
            sudo find '$WEB_PATH' -type d -exec chmod 755 {} \;
          "

          echo 'Deployment completed successfully'